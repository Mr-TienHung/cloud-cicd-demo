<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CI/CD Demo - Math App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card calculator">
            <h2>🧮 Máy tính Số học</h2>
            <input type="text" id="calc-screen" placeholder="0" readonly>
            
            <div class="calc-buttons">
                <button onclick="clearCalc()" class="btn-calc-clear">C</button>
                <button onclick="pressCalc('/')">/</button>
                <button onclick="pressCalc('*')">*</button>
                <button onclick="pressCalc('-')">-</button>
                
                <button onclick="pressCalc('7')">7</button>
                <button onclick="pressCalc('8')">8</button>
                <button onclick="pressCalc('9')">9</button>
                <button onclick="pressCalc('+')">+</button>
                
                <button onclick="pressCalc('4')">4</button>
                <button onclick="pressCalc('5')">5</button>
                <button onclick="pressCalc('6')">6</button>
                
                <button onclick="pressCalc('1')">1</button>
                <button onclick="pressCalc('2')">2</button>
                <button onclick="pressCalc('3')">3</button>
                <button onclick="calculateResult()" class="btn-calc-equal">=</button>
                
                <button onclick="pressCalc('0')" style="grid-column: span 2;">0</button>
                <button onclick="pressCalc('.')">.</button>
            </div>
        </div>

        <div class="card math-game">
            <h2>🎮 Thách thức Tính nhẩm</h2>
            <div class="score-board">Điểm số: <span id="game-score">0</span></div>
            <div class="game-box">
                <div id="question">Đang tải...</div>
                <input type="text" id="game-answer" placeholder="Bấm phím số bên dưới..." readonly>
                
                <div class="game-pad-grid">
                    <button onclick="pressMathPad('1')">1</button>
                    <button onclick="pressMathPad('2')">2</button>
                    <button onclick="pressMathPad('3')">3</button>
                    <button onclick="pressMathPad('4')">4</button>
                    <button onclick="pressMathPad('5')">5</button>
                    <button onclick="pressMathPad('6')">6</button>
                    <button onclick="pressMathPad('7')">7</button>
                    <button onclick="pressMathPad('8')">8</button>
                    <button onclick="pressMathPad('9')">9</button>
                    <button onclick="pressMathPad('-')">-</button>
                    <button onclick="pressMathPad('0')">0</button>
                    <button onclick="clearMathPad()" class="btn-pad-clear">Xóa</button>
                </div>

                <button id="submit-answer-btn" class="btn-beauty btn-submit" style="width: 100%; margin-top: 15px;">Gửi kết quả</button>
                <div id="game-feedback"></div>
            </div>
        </div>

        <div class="card notes-section">
            <h2>📝 Nhật ký Ghi chú</h2>
            <textarea id="note-input" placeholder="Nhập nhanh công thức hoặc ghi chú vào đây..."></textarea>
            <button id="save-note-btn" class="btn-beauty btn-note" style="width: 100%; margin-top: 10px;">Lưu Ghi Chú</button>
            <ul id="notes-list"></ul>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>💥 GAME OVER 💥</h2>
            <p>Thời gian đã hết! Bạn rất cố gắng rồi.</p>
            <div class="final-score">Tổng điểm: <span id="final-score-val">0</span></div>
            <button onclick="restartGame()" class="btn-beauty btn-restart">🔄 Chơi lại</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
