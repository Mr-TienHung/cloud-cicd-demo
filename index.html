<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CI/CD Demo - Chunkbase Interactive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="navbar">
        <div class="logo">Chunkbase <span class="demo-tag">CI/CD Demo</span></div>
        <div class="intro-text">Ứng dụng đa năng tích hợp công cụ mô phỏng & Tiện ích giải trí</div>
        <div class="nav-right">
            <div id="live-clock" class="clock-box"></div>
            <button id="theme-toggle" class="btn-toggle">☀️ Chế độ Sáng</button>
        </div>
    </header>

    <main class="container">
        <h1>Minecraft Seed Map Viewer & Workspace</h1>
        
        <section class="control-panel">
            <div class="input-group">
                <label for="seed">Seed:</label>
                <input type="text" id="seed" placeholder="Nhập mã seed tại đây..." value="1234567890">
            </div>
            <div class="input-group">
                <label for="version">Phiên bản:</label>
                <select id="version">
                    <option>Java 1.21.5</option>
                    <option>Java 1.20</option>
                    <option>Bedrock 1.21</option>
                </select>
            </div>
            <button class="btn-find" onclick="alert('Đang quét cấu trúc thế giới...')">Tìm kiếm</button>
        </section>

        <section class="map-wrapper">
            <div class="map-grid">
                <div class="chunk stronghold">Stronghold</div>
                <div class="chunk ocean">Ocean</div>
                <div class="chunk village">Village</div>
                <div class="chunk spawn">Spawn</div>
                <div class="chunk monument">Monument</div>
                <div class="chunk desert">Desert</div>
                <div class="chunk nether">Nether Portal</div>
                <div class="chunk slime">Slime Chunk</div>
                <div class="chunk mansion">Mansion</div>
            </div>
            <div class="coordinates">Tọa độ: <span class="coord-val">X: 256, Z: -512</span></div>
        </section>

        <div class="utility-grid">
            <section class="widget-box calculator">
                <h3>🧮 Máy tính bỏ túi</h3>
                <input type="text" id="calc-screen" readonly>
                <div class="calc-buttons">
