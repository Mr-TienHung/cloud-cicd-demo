<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CI/CD Demo - Chunkbase Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Chunkbase <span class="demo-tag">CI/CD Demo</span></div>
        <nav>
            <ul>
                <li><a href="#" class="active">Apps</a></li>
                <li><a href="#">Seeds</a></li>
                <li><a href="#">Tutorials</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Minecraft Seed Map Viewer</h1>
        
        <section class="control-panel">
            <div class="input-group">
                <label for="seed">Seed:</label>
                <input type="text" id="seed" placeholder="Nhập mã seed tại đây..." value="1234567890">
            </div>
            <div class="input-group">
                <label for="version">Phiên bản:</label>
                <select id="version">
                    <option>Java 1.20 or newer</option>
                    <option>Java 1.19</option>
                    <option>Bedrock 1.20</option>
                </select>
            </div>
            <button class="btn-find" onclick="alert('Đang tìm kiếm cấu trúc thế giới...')">Tìm kiếm</button>
        </section>

        <section class="map-wrapper">
            <div class="map-grid">
                <div class="chunk stronghold">Stronghold</div>
                <div class="chunk ocean">Ocean</div>
                <div class="chunk village">Village</div>
                <div class="chunk spawn">Spawn</div>
                <div class="chunk monument">Monument</div>
                <div class="chunk desert">Desert</div>
                <div class="chunk nether">Nether Portal</div>
                <div class="chunk slime">Slime Chunk</div>
                <div class="chunk mansion">Mansion</div>
            </div>
            <div class="coordinates">
                Tọa độ hiện tại: <span class="coord-val">X: 256, Z: -512</span>
            </div>
        </section>

        <section class="features-filter">
            <h3>Hiển thị cấu trúc</h3>
            <div class="checkbox-group">
                <label><input type="checkbox" checked> Thôn làng (Villages)</label>
                <label><input type="checkbox" checked> Ngục tối (Strongholds)</label>
                <label><input type="checkbox"> Đền thờ sa mạc</label>
                <label><input type="checkbox" checked> Slime Chunks</label>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Cloud CI/CD Demo - Bài thực hành GitHub Actions tự động hóa.</p>
    </footer>

</body>
</html>
